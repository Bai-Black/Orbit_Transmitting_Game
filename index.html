<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轨道转移</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const G = 500;
const THRUST_MAX = 200;
const ROT_SPEED = 2.5;
const TRAIL_LEN = 300;
const DT = 1 / 60;

const bodies = [
  { x: 300, y: 400, mass: 5000, radius: 35, label: '天体 A' },
  { x: 1200, y: 400, mass: 3000, radius: 25, label: '天体 B' }
];

const ship = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, throttle: 0 };
let trail = [];
let stars = [];
let gameState = 'TITLE';
let winTimer = 0;
let keys = {};

const ORBIT_R_OFFSET = 120;
const WIN_DIST_MIN = 80;
const WIN_DIST_MAX = 250;
const ESCAPE_DIST = 3000;

function generateStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * 3000 - 500,
      y: Math.random() * 2000 - 200,
      brightness: Math.random() * 0.5 + 0.3
    });
  }
}

function initShip() {
  const b = bodies[0];
  const r = b.radius + ORBIT_R_OFFSET;
  const v = Math.sqrt(G * b.mass / r);
  ship.x = b.x + r;
  ship.y = b.y;
  ship.vx = 0;
  ship.vy = -v;
  ship.angle = -Math.PI / 2;
  ship.throttle = 0;
  trail = [];
  winTimer = 0;
}

function resetGame() {
  initShip();
  gameState = 'PLAYING';
}

function gravity(ax, ay, bx, by, mass) {
  const dx = bx - ax;
  const dy = by - ay;
  const distSq = dx * dx + dy * dy;
  const dist = Math.sqrt(distSq);
  if (dist < 1) return { x: 0, y: 0 };
  const force = G * mass / distSq;
  return { x: force * dx / dist, y: force * dy / dist };
}

function update() {
  if (gameState !== 'PLAYING') return;

  if (keys['ArrowLeft']) ship.angle -= ROT_SPEED * DT;
  if (keys['ArrowRight']) ship.angle += ROT_SPEED * DT;

  if (keys['ArrowUp']) {
    ship.throttle = Math.min(1, ship.throttle + 1.5 * DT);
  } else if (keys['ArrowDown']) {
    ship.throttle = Math.max(0, ship.throttle - 1.5 * DT);
  } else {
    ship.throttle = Math.max(0, ship.throttle - 0.3 * DT);
  }

  let ax = 0, ay = 0;
  for (const b of bodies) {
    const g = gravity(ship.x, ship.y, b.x, b.y, b.mass);
    ax += g.x;
    ay += g.y;
  }

  if (ship.throttle > 0.01) {
    ax += THRUST_MAX * ship.throttle * Math.cos(ship.angle);
    ay += THRUST_MAX * ship.throttle * Math.sin(ship.angle);
  }

  ship.vx += ax * DT;
  ship.vy += ay * DT;
  ship.x += ship.vx * DT;
  ship.y += ship.vy * DT;

  trail.push({ x: ship.x, y: ship.y });
  if (trail.length > TRAIL_LEN) trail.shift();

  for (const b of bodies) {
    const dx = ship.x - b.x;
    const dy = ship.y - b.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < b.radius) {
      gameState = 'CRASH';
      return;
    }
  }

  const dx2 = ship.x - bodies[1].x;
  const dy2 = ship.y - bodies[1].y;
  const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
  const orbitR = dist2 - bodies[1].radius;
  const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
  const orbitalSpeed = Math.sqrt(G * bodies[1].mass / dist2);

  if (orbitR > WIN_DIST_MIN && orbitR < WIN_DIST_MAX &&
      speed > orbitalSpeed * 0.7 && speed < orbitalSpeed * 1.3) {
    winTimer += DT;
    if (winTimer >= 2) {
      gameState = 'WIN';
      return;
    }
  } else {
    winTimer = Math.max(0, winTimer - DT * 2);
  }

  let tooFar = true;
  for (const b of bodies) {
    const ddx = ship.x - b.x;
    const ddy = ship.y - b.y;
    if (Math.sqrt(ddx * ddx + ddy * ddy) < ESCAPE_DIST) {
      tooFar = false;
      break;
    }
  }
  if (tooFar) resetGame();
}

let camX = 0, camY = 0;

function drawBackground() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawStars() {
  for (const s of stars) {
    const sx = s.x - camX + canvas.width / 2;
    const sy = s.y - camY + canvas.height / 2;
    if (sx < -10 || sx > canvas.width + 10 || sy < -10 || sy > canvas.height + 10) continue;
    const c = Math.floor(s.brightness * 255);
    ctx.fillStyle = `rgb(${c},${c},${c})`;
    ctx.fillRect(Math.floor(sx), Math.floor(sy), 1, 1);
  }
}

function drawBody(b) {
  const sx = b.x - camX + canvas.width / 2;
  const sy = b.y - camY + canvas.height / 2;

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(sx, sy, b.radius, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx - b.radius * 0.5, sy);
  ctx.lineTo(sx + b.radius * 0.5, sy);
  ctx.moveTo(sx, sy - b.radius * 0.5);
  ctx.lineTo(sx, sy + b.radius * 0.5);
  ctx.stroke();

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.label, sx, sy + b.radius + 14);
}

function drawTrail() {
  if (trail.length < 2) return;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < trail.length; i++) {
    const sx = trail[i].x - camX + canvas.width / 2;
    const sy = trail[i].y - camY + canvas.height / 2;
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }
  ctx.stroke();

  for (let i = 0; i < trail.length; i += 4) {
    const alpha = (i / trail.length) * 0.5;
    const sx = trail[i].x - camX + canvas.width / 2;
    const sy = trail[i].y - camY + canvas.height / 2;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(Math.floor(sx), Math.floor(sy), 1, 1);
  }
}

function drawShip() {
  const sx = ship.x - camX + canvas.width / 2;
  const sy = ship.y - camY + canvas.height / 2;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(ship.angle);

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(-6, -5);
  ctx.lineTo(-4, 0);
  ctx.lineTo(-6, 5);
  ctx.closePath();
  ctx.fill();

  if (ship.throttle > 0.05) {
    const flameLen = 4 + ship.throttle * 12;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const offset = (i - 1) * 2;
      const len = flameLen * (0.6 + Math.random() * 0.4);
      ctx.beginPath();
      ctx.moveTo(-5, offset);
      ctx.lineTo(-5 - len, offset + (Math.random() - 0.5) * 2);
      ctx.stroke();
    }
  }

  ctx.restore();

  if (winTimer > 0) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    const tx = bodies[1].x - camX + canvas.width / 2;
    const ty = bodies[1].y - camY + canvas.height / 2;
    const d = Math.sqrt((ship.x - bodies[1].x) ** 2 + (ship.y - bodies[1].y) ** 2);
    ctx.arc(tx, ty, d, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawHUD() {
  const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
  const dx2 = ship.x - bodies[1].x;
  const dy2 = ship.y - bodies[1].y;
  const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2) - bodies[1].radius;
  const dx1 = ship.x - bodies[0].x;
  const dy1 = ship.y - bodies[0].y;
  const dist1 = Math.sqrt(dx1 * dx1 + dy1 * dy1) - bodies[0].radius;

  const barLen = 30;
  const filled = Math.floor(ship.throttle * barLen);
  const bar = '[' + '='.repeat(filled) + ' '.repeat(barLen - filled) + ']';

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('速度: ' + speed.toFixed(1), 12, 24);
  ctx.fillText('距 A: ' + dist1.toFixed(0), 12, 40);
  ctx.fillText('距 B: ' + dist2.toFixed(0), 12, 56);
  ctx.fillText('油门: ' + bar + ' ' + (ship.throttle * 100).toFixed(0) + '%', 12, 72);

  if (gameState === 'PLAYING' && winTimer > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('轨道匹配: ' + (winTimer / 2 * 100).toFixed(0) + '%', canvas.width / 2, canvas.height - 30);
  }
}

function drawTitle() {
  drawBackground();
  drawStars();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('轨 道 转 移', canvas.width / 2, canvas.height / 2 - 80);

  ctx.font = '16px monospace';
  ctx.fillText('ORBITAL TRANSFER', canvas.width / 2, canvas.height / 2 - 45);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2 + 20;

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx - 100, cy, 12, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx + 100, cy, 8, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.arc(cx - 100, cy, 50, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('<- ->  旋转姿态', cx, cy + 80);
  ctx.fillText('^ v   控制油门', cx, cy + 100);
  ctx.fillText('将飞行器变轨至另一天体', cx, cy + 130);

  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  const blink = Math.floor(Date.now() / 500) % 2;
  if (blink) ctx.fillText('[ 按空格键开始 ]', cx, cy + 170);
}

function drawOverlay(title, subtitle) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);

  ctx.font = '14px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 20);

  const blink = Math.floor(Date.now() / 500) % 2;
  if (blink) {
    ctx.fillStyle = '#fff';
    ctx.fillText('[ 按空格键重新开始 ]', canvas.width / 2, canvas.height / 2 + 60);
  }
}

function render() {
  if (gameState === 'TITLE') {
    drawTitle();
    return;
  }

  camX += (ship.x - camX) * 0.1;
  camY += (ship.y - camY) * 0.1;

  drawBackground();
  drawStars();
  drawTrail();
  for (const b of bodies) drawBody(b);
  drawShip();
  drawHUD();

  if (gameState === 'WIN') drawOverlay('任 务 完 成', '成功变轨至目标天体');
  if (gameState === 'CRASH') drawOverlay('坠 毁', '飞行器撞击天体表面');
}

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameState === 'TITLE' || gameState === 'WIN' || gameState === 'CRASH') {
      resetGame();
    }
  }
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});

window.addEventListener('keyup', function(e) {
  keys[e.code] = false;
});

generateStars();
initShip();
camX = ship.x;
camY = ship.y;
gameLoop();
</script>
</body>
</html>
